<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Budget Monitor</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<main>
  <header class="page-header">
    <h1>Budget Monitor</h1>
    <span id="yearLabel" class="muted"></span>
  </header>

  <section class="status-grid">
    <article class="status-card" id="statusTransport">
      <h2>Transport</h2>
      <p class="status-line" data-role="line">—</p>
      <p class="sub muted" data-role="sub"></p>
    </article>
    <article class="status-card" id="statusBenefits">
      <h2>Benefits</h2>
      <p class="status-line" data-role="line">—</p>
      <p class="sub muted" data-role="sub"></p>
    </article>
  </section>

  <section class="card">
    <div class="card-head">
      <h3>Monthly breakdown</h3>
      <div class="card-actions">
        <button id="addBtn" type="button">Add entry</button>
        <button id="historyBtn" type="button" class="ghost">History</button>
      </div>
    </div>
    <p class="muted small edit-hint">Click <strong>Add entry</strong> to log a spend. Values save to this browser.</p>
    <div id="monthsList" class="months"></div>
  </section>

  <dialog id="addDialog">
    <h3>Add entry</h3>
    <form id="addForm" method="dialog">
      <label class="field">
        <span>Amount (lei)</span>
        <input id="addAmount" type="number" min="0" step="1" required />
      </label>
      <label class="field">
        <span>Month</span>
        <select id="addMonth" required></select>
      </label>
      <label class="field">
        <span>Category</span>
        <select id="addCategory" required>
          <option value="transport">Transport</option>
          <option value="benefits">Benefits</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button id="addCancelBtn" type="button" class="ghost">Cancel</button>
        <button id="addSaveBtn" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="historyDialog">
    <h3>History</h3>
    <p class="muted small">Click <strong>Delete</strong> to remove an entry — totals update immediately.</p>
    <div id="historyList" class="history-list"></div>
    <div class="dialog-actions">
      <button id="historyCloseBtn" type="button" class="ghost">Close</button>
    </div>
  </dialog>

  <section class="card totals">
    <h3>Year to date</h3>
    <div id="yearTotals" class="totals-grid"></div>
  </section>

  <footer class="muted small">
    Data lives in <code>data.json</code>. Edit + commit to update.
  </footer>
</main>
<script src="app.js"></script>
</body>
</html>
